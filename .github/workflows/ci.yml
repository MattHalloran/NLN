name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install script test runner
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Build shared package
        run: yarn workspace @local/shared build

      - name: Prepare Prisma schema
        run: |
          mkdir -p packages/server/dist/db
          cp packages/server/src/db/schema.prisma packages/server/dist/db/schema.prisma
          cp -R packages/server/src/db/migrations packages/server/dist/db/migrations

      - name: Generate Prisma client
        run: yarn workspace server prisma generate --schema src/db/schema.prisma

      - name: Validate quick gate
        run: yarn validate:quick

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: |
            packages/shared/coverage
            packages/server/coverage
            packages/ui/coverage
          if-no-files-found: ignore

      - name: Coverage summary
        if: always()
        run: yarn coverage:summary

      - name: Build UI
        run: yarn workspace ui build

      - name: PWA browser tests
        run: |
          yarn playwright install --with-deps chromium
          yarn test:pwa

      - name: Lighthouse public page checks
        timeout-minutes: 10
        run: yarn lighthouse:local

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci
          if-no-files-found: ignore

      - name: Upload PWA Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pwa
          path: |
            playwright-report/pwa
            test-results/pwa.json
          if-no-files-found: ignore

      - name: Validation receipt
        if: always()
        run: |
          VALIDATION_COMMAND="ci validate job: yarn validate:quick, shared build, ui build, pwa, lighthouse" yarn validation:receipt

      - name: Upload validation receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-receipt-validate
          path: .validation/latest-receipt.md
          if-no-files-found: ignore

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: integration-jwt-secret
      CSRF_SECRET: integration-csrf-secret
      TESTCONTAINERS_RYUK_DISABLED: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @local/shared build

      - name: Prepare Prisma schema
        run: |
          mkdir -p packages/server/dist/db
          cp packages/server/src/db/schema.prisma packages/server/dist/db/schema.prisma
          cp -R packages/server/src/db/migrations packages/server/dist/db/migrations

      - name: Generate Prisma client
        run: yarn workspace server prisma generate --schema src/db/schema.prisma

      - name: Integration tests
        run: yarn test:integration

      - name: Coverage summary
        if: always()
        run: yarn coverage:summary

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: packages/server/coverage-integration
          if-no-files-found: ignore

      - name: Validation receipt
        if: always()
        run: |
          VALIDATION_COMMAND="ci integration job: yarn test:integration" yarn validation:receipt

      - name: Upload validation receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-receipt-integration
          path: .validation/latest-receipt.md
          if-no-files-found: ignore

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
      PROJECT_DIR: ${{ github.workspace }}
      JWT_SECRET: e2e-jwt-secret
      CSRF_SECRET: e2e-csrf-secret
      ADMIN_EMAIL: admin@example.test
      ADMIN_PASSWORD: admin-password
      DB_NAME: nln_e2e
      DB_USER: nln_e2e
      DB_PASSWORD: nln_e2e
      PORT_DB: 5433
      PORT_REDIS: 6379
      PORT_SERVER: 5331
      DB_URL: postgresql://nln_e2e:nln_e2e@localhost:5433/nln_e2e
      DATABASE_URL: postgresql://nln_e2e:nln_e2e@localhost:5433/nln_e2e
      REDIS_CONN: localhost:6379
      SERVER_LOCATION: local
      VITE_SERVER_LOCATION: local
      VITE_PORT_SERVER: 5331
      CREATE_MOCK_DATA: true
      DB_PULL: false
      EMAIL_MODE: console
      ALLOW_MIGRATION_WITHOUT_BACKUP: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @local/shared build

      - name: Prepare Prisma schema
        run: |
          mkdir -p packages/server/dist/db
          cp packages/server/src/db/schema.prisma packages/server/dist/db/schema.prisma
          cp -R packages/server/src/db/migrations packages/server/dist/db/migrations

      - name: Generate Prisma client
        run: yarn workspace server prisma generate --schema src/db/schema.prisma

      - name: Install Chromium
        run: yarn playwright install --with-deps chromium

      - name: Run accessibility E2E tests
        run: yarn test:a11y

      - name: Upload accessibility Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-accessibility
          path: |
            playwright-report/accessibility
            test-results/accessibility.json
          if-no-files-found: ignore

      - name: Run public visitor E2E tests
        run: yarn test:e2e:public

      - name: Upload public Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-public
          path: |
            playwright-report/public
            test-results/public.json
          if-no-files-found: ignore

      - name: Run visual regression tests
        run: yarn test:visual

      - name: Upload visual Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-visual
          path: |
            playwright-report/visual
            test-results/visual.json
            test-results/visual-artifacts
          if-no-files-found: ignore

      - name: Run admin E2E tests
        run: yarn test:e2e:admin

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-admin
          path: |
            playwright-report/admin
            test-results/admin.json
          if-no-files-found: ignore

      - name: Validation receipt
        if: always()
        run: |
          VALIDATION_COMMAND="ci e2e job: yarn test:a11y, yarn test:e2e:public, yarn test:visual, yarn test:e2e:admin" yarn validation:receipt

      - name: Upload validation receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-receipt-e2e
          path: .validation/latest-receipt.md
          if-no-files-found: ignore

  deploy-rehearsal:
    name: Deploy Rehearsal
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Run disposable deploy rehearsal
        run: ./scripts/deploy-rehearsal.sh -v "rehearsal-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

  trusted-gate:
    name: Trusted Gate
    runs-on: ubuntu-latest
    needs:
      - validate
      - integration
      - e2e
      - deploy-rehearsal
    if: always()
    steps:
      - name: Check required validation jobs
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ] || \
             [ "${{ needs.deploy-rehearsal.result }}" != "success" ]; then
            echo "Required validation jobs did not all pass."
            echo "validate=${{ needs.validate.result }}"
            echo "integration=${{ needs.integration.result }}"
            echo "e2e=${{ needs.e2e.result }}"
            echo "deploy-rehearsal=${{ needs.deploy-rehearsal.result }}"
            exit 1
          fi
          echo "Trusted gate passed."

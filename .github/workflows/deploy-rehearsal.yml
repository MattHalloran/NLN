name: Deploy Rehearsal

on:
  push:
    paths:
      - ".github/workflows/deploy-rehearsal.yml"
      - "docker-compose-prod.yml"
      - "package.json"
      - "yarn.lock"
      - "packages/**"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/deploy-rehearsal.yml"
      - "docker-compose-prod.yml"
      - "package.json"
      - "yarn.lock"
      - "packages/**"
      - "scripts/**"
  workflow_dispatch:
  schedule:
    - cron: "23 10 * * 1"

permissions:
  contents: read

concurrency:
  group: deploy-rehearsal
  cancel-in-progress: false

jobs:
  rehearsal:
    name: Disposable Deploy Rehearsal
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Run disposable deploy rehearsal
        run: |
          set -o pipefail
          umask 077
          mkdir -p .validation/reliability
          ./scripts/deploy-rehearsal.sh \
            -v "rehearsal-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            2>&1 | tee .validation/reliability/deploy-rehearsal.log

      - name: Upload deploy rehearsal evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: synthetic-deploy-rehearsal
          path: .validation/reliability/deploy-rehearsal.log
          if-no-files-found: error
